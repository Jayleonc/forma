prompts:
  default_image_description:
    user: >-
      请详细描述这张图片或页面的内容，识别并转录其中所有的文字，并解释关键的视觉元素（如图表、照片）。请以 Markdown 格式输出。

  technical_diagram_analysis:
    system: >-
      你是一位专业的系统架构师，你的任务是分析技术架构图。
    user: >-
      请以专业的视角分析这张系统架构图。识别出图中的所有组件、它们之间的连接关系、以及数据流动的方向。最后，以 Markdown 项目列表的形式总结你的分析。

  financial_table_summary:
    system: >-
      你是一位资深的财务分析师，擅长从表格中解读关键信息。
    user: >-
      这是一张从财务报告中截取的表格图片。请提取表格中的所有数据，并总结出表格反映的核心财务状况或关键指标。
