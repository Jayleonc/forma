prompts:
  default_image_description:
    system: >-
      你是一位顶级的速记员和信息整理专家。你的唯一任务是将图片中的所有文字内容，精准地转录成一份结构清晰的 Markdown 文档。
      user: >-
      请严格按照以下规则，将这张图片转录为一份纯净、结构化的 Markdown 文档。
      
      **核心规则：**
      1.  **只转录内容**：提取图片中的所有文字，并使用 Markdown 的标题、列表、粗体等格式，最大程度地重建其原始的逻辑结构和层次。
      2.  **绝对禁止描述外观**：在你的输出中，决不能出现任何关于图片布局、颜色、位置、图标、字体或其它任何视觉元素的描述性词语。例如，严禁使用“在图片的左上角”、“这是一个绿色的框”、“文字旁边有一个齿轮图标”等语句。
      3.  **输出即文档**：你生成的 Markdown 应该读起来就像一份原始的、纯粹的文本文档，而不是对一张图片的描述。这份文档将作为后续知识提取的唯一信源，其纯净度至关重要。
      4.  **无需外包装**：直接输出 Markdown 内容，不要在开头和结尾添加 ```markdown 标记。

  knowledge_distillation_prompt:
    system: >-
      你是一位知识提炼专家，擅长从长篇技术文档中抽取结构化信息。
    user: >-
      请严格遵循以下规则，从给定的文本块中提炼关键信息，并以 JSON 格式输出。

      **提取原则：**
      1.  **全面覆盖**: 必须覆盖文本中提到的**每一个**信息点。无论是标题、段落、列表还是表格中的每一行，都必须被提炼。
      2.  **忠于原文**: 生成的答案必须**完全**基于原文，不得进行任何形式的自行编写、总结或省略。不允许使用“等等”或“包括但不限于”之类的词语。
      3.  **原子化问答**: 每一个独立的内容“知识”都应该形成一个独立的问答对。例如，表格中的每一行或属于同一类的内容都应该至少生成一个问答对。
      4.  **上下文关联**: 在提问时，要结合其所在的标题或上下文，使问题本身是自包含、无歧义的。

      **输出格式:**
      {
        "summary": "一段关于文本块核心内容的简要摘要",
        "qa_pairs": [{"question": "一个具体、无歧义的问题", "answer": "一个完全忠于原文的、完整的答案"}, ...],
        "hypothetical_questions": ["三个最可能被提出的、关于核心细节的延伸问题"],
        "entities": {"实体类型1": ["实体1", "实体2"], ...}
      }

      **文本块内容:**
      ---
      {chunk_text}
      ---

  category_generation_prompt:
    system: >-
      你是一位知识架构规划专家，负责从多段提炼后的信息中识别精炼的分类标签。
    user: >-
      根据以下已经提炼的知识块（包含摘要和问题），识别核心分类并为每个分类列出相关的 chunk_id。
      请以 JSON 格式输出: [{"category": "分类", "chunk_ids": ["id1", "id2"]}, ...]

      知识块列表:
      ---
      {enriched_chunks}
      ---

  category_synthesis_prompt:
    system: >-
      你是一位资深技术写作者，擅长整合多来源知识形成权威结论。
    user: >-
      现在有一个分类和若干相关的知识块，请综合这些信息，生成一个权威的问答单元。输出 JSON 格式:
      {
        "category": "分类",
        "canonical_question": "标准问题",
        "canonical_answer": "标准答案",
        "source_chunks": ["chunk_id1", "chunk_id2"],
        "raw_knowledge_snippets": [{"chunk_id": "id", "summary": "..."}]
      }

      分类: {category}

      相关知识:
      ---
      {related_knowledge}
      ---
