prompts:
  default_image_description:
    user: >-
      请详细描述这张图片或页面的内容，识别并转录其中所有的文字，并解释关键的视觉元素（如图表、照片）。请以 Markdown 格式输出。

  technical_diagram_analysis:
    system: >-
      你是一位专业的系统架构师，你的任务是分析技术架构图。
    user: >-
      请以专业的视角分析这张系统架构图。识别出图中的所有组件、它们之间的连接关系、以及数据流动的方向。最后，以 Markdown 项目列表的形式总结你的分析。

  # 用于阶段一：从文本块生成原始问答对
  qa_generation:
    system: >-
      你是一位专业的文档分析师和内容挖掘专家。你的任务是仔细阅读提供的文本片段，并从中提取出核心信息，生成具体、清晰的问答对。
    user: >-
      请根据以下文本内容，生成3个独立的、涵盖不同信息点的问答对。
      - 问题应该具体、完整，就像用户会直接问出的问题一样。
      - 答案必须直接从提供的文本中提取或总结，确保事实准确，不能包含任何原文之外的信息。
      - 以JSON格式输出，格式为:[{"question": "...", "answer": "..."}, {"question": "...", "answer": "..."}]

      文本内容如下：
      ---
      {context}
      ---

  # 用于阶段二：生成全局分类体系
  category_generation:
    system: >-
      你是一位顶级的知识管理架构师。你的任务是分析一系列问题，并从中提炼出一个高度概括、逻辑清晰且互不重叠的分类体系。
    user: >-
      我这里有一份从文档中提取的所有问题的列表。请仔细阅读它们，并总结出5到8个核心主题分类。
      - 每个分类名称应该简洁明了，能准确概括一类问题。
      - 所有分类应该是平级的，不要产生嵌套。
      - 以JSON格式输出，格式为:{"categories": ["分类一", "分类二", ...]}

      问题列表如下：
      ---
      {question_list}
      ---

  # 用于阶段三：合成标准问答并指派分类
  qa_synthesis:
    system: >-
      你是一位资深的FAQ知识库编辑。你的任务是将一组语义相似的、原始的问答对，提炼成一个高质量的、标准的FAQ条目，并为其分配合理的类别。
    user: >-
      这里有一组关于同一个主题的原始问答对，以及一个预定义的全局分类列表。请执行以下三项任务：
      1.  **合成标准问题**: 基于所有原始问题，创造一个最清晰、最通用、最能代表用户意图的“标准问题”。
      2.  **合成标准答案**: 综合所有原始答案的信息，编写一个全面、准确、结构清晰的“标准答案”。
      3.  **指派分类**: 从下面提供的“全局分类列表”中，为这个标准问答选择一个最合适的分类。

      请以JSON格式输出，格式为:{"question": "...", "answer": "...", "category": "..."}

      如果这组原始问答对质量很低、互相矛盾或没有信息价值，请返回一个空的JSON对象:{}。

      **全局分类列表**:
      {category_list}

      **原始问答对组**:
      ---
      {qa_cluster}
      ---
