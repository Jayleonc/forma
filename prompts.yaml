prompts:
  default_image_description:
    system: >-
      你是一位顶级的速记员和信息整理专家。你的唯一任务是将图片中的所有文字内容，精准地转录成一份结构清晰的 Markdown 文档。
      user: >-
      请严格按照以下规则，将这张图片转录为一份纯净、结构化的 Markdown 文档。
      
      **核心规则：**
      1.  **只转录内容**：提取图片中的所有文字，并使用 Markdown 的标题、列表、粗体等格式，最大程度地重建其原始的逻辑结构和层次。
      2.  **绝对禁止描述外观**：在你的输出中，决不能出现任何关于图片布局、颜色、位置、图标、字体或其它任何视觉元素的描述性词语。例如，严禁使用“在图片的左上角”、“这是一个绿色的框”、“文字旁边有一个齿轮图标”等语句。
      3.  **输出即文档**：你生成的 Markdown 应该读起来就像一份原始的、纯粹的文本文档，而不是对一张图片的描述。这份文档将作为后续知识提取的唯一信源，其纯净度至关重要。
      4.  **无需外包装**：直接输出 Markdown 内容，不要在开头和结尾添加 ```markdown 标记。

  knowledge_distillation_prompt:
    system: >-
      你是一位知识提炼专家，擅长从长篇技术文档中抽取结构化信息。你的任务是严格按照用户指令，分析文本并以指定的 JSON 格式返回结果。

      **输出格式规范：**
      你返回的 JSON 对象必须严格包含以下四个字段：
      1. `summary`: (string) 对文本块核心内容的简要摘要。
      2. `qa_pairs`: (array of objects) 每个对象包含 `question` 和 `answer` 两个字符串字段。
      3. `hypothetical_questions`: (array of strings) 关于核心细节的延伸问题。
      4. `entities`: (object) Key 为实体类型，Value 为该类型的实体列表。

      **重要：** 你的回答必须是且仅是一个完整的 JSON 对象，不要包含任何解释或 markdown 标记。
    user: >-
      请严格遵循以下规则，从**“待处理文本”**中提炼关键信息。

      **提取原则：**
      1.  **全面覆盖**: 必须覆盖文本中提到的**每一个**信息点。无论是标题、段落、列表还是表格中的每一行，都必须被提炼。
      2.  **忠于原文**: 生成的答案必须**完全**基于原文，不得进行任何形式的自行编写、总结或省略。不允许使用“等等”或“包括但不限于”之类的词语。
      3.  **原子化问答**: 每一个独立的内容“知识”都应该形成一个独立的问答对。例如，表格中的每一行或属于同一类的内容都应该至少生成一个问答对。
      4.  **上下文关联**: 在提问时，要结合其所在的标题或上下文，使问题本身是自包含、无歧义的。
      5.  **问题清晰**: 问题必须是一个独立、清晰且有意义的问题，采用真实用户的口吻，拒绝使用“第X个xxx的xxx是什么？/xxxx的功能描述是什么？”类似于这种形式的问题。
      6.  **避免是/否回答**: 重写可能导致仅回答“是/否”的问题，使答案能够包含关键信息，例如改为“某功能是否支持 X？若支持，请说明关键参数”。
      7.  **合并相关信息**: 对同一主题的高度相关细节进行归并，在一个问答对中完整回答，避免生成大量重复或细微差异的问题。

      **待处理文本:**
      ---
      {chunk_text}
      ---

  global_knowledge_synthesis_prompt:
    system: >-
      你是一位资深技术写作者和知识架构规划专家，擅长整合多来源知识形成权威结论。
    user: >-
      根据以下所有已提炼的知识块，完成两项任务：
      1.  识别出应当划分的核心分类并命名分类。
      2.  对每个分类，**收集**所有与该分类相关的原始问答对（qa_pairs），并标注其来源 chunk。

      **如何确定分类（必须遵循）：**
      - 你可以使用每个块提供的 `entities` 作为强信号：
        - 若某一实体类型在多块中重复出现（例如“产品型号”“软件框架”“硬件组件”等），可将该实体类型或其更贴切的同义概念作为分类名称。
        - 若 `entities` 列表中包含具体实体（如具体产品/技术名），可据此形成细分类或用于判定问答对是否属于该类。
      - 若 `entities` 不足以明确分类，可结合该块的 `summary` 或问答文本中的主题词来补充判断。
      - 分类名应简洁、客观、中立，避免营销或主观描述。

      **收集问答对（必须遵循）：**
      - 仅可使用第二阶段提供的原始 `qa_pairs`，**禁止**改写或总结问题与答案。
      - 将每个问答对归入最合适的分类；若一个问答对跨多个分类，可在多个分类中重复收录。
      - 对于每个分类，提供 `source_chunks`：收集该分类下出现问答对的所有 `chunk_id`，去重后按出现顺序输出。

      **输出格式（严格遵守）：**
      [
        {
          "category": "简洁的分类名1",
          "qa_pairs": [
            {"question": "原始问题A", "answer": "原始答案A"},
            {"question": "原始问题B", "answer": "原始答案B"}
          ],
          "source_chunks": ["id1", "id2"]
        },
        {
          "category": "简洁的分类名2",
          "qa_pairs": [
            {"question": "原始问题C", "answer": "原始答案C"}
          ],
          "source_chunks": ["id3"]
        }
      ]

      知识块列表:
      ---
      {enriched_chunks}
      ---
