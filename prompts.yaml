prompts:
  default_image_description:
    system: >-
      你是一位顶级的速记员和信息整理专家。你的唯一任务是将图片中的所有文字内容，精准地转录成一份结构清晰的 Markdown 文档。
      user: >-
      请严格按照以下规则，将这张图片转录为一份纯净、结构化的 Markdown 文档。

      **核心规则：**
      1.  **只转录内容**：提取图片中的所有文字，并使用 Markdown 的标题、列表、粗体等格式，最大程度地重建其原始的逻辑结构和层次。
      2.  **绝对禁止描述外观**：在你的输出中，决不能出现任何关于图片布局、颜色、位置、图标、字体或其它任何视觉元素的描述性词语。例如，严禁使用“在图片的左上角”、“这是一个绿色的框”、“文字旁边有一个齿轮图标”等语句。
      3.  **输出即文档**：你生成的 Markdown 应该读起来就像一份原始的、纯粹的文本文档，而不是对一张图片的描述。这份文档将作为后续知识提取的唯一信源，其纯净度至关重要。
      4.  **无需外包装**：直接输出 Markdown 内容，不要在开头和结尾添加 ```markdown 标记。

  docx_image_description:
    system: >-
      你是一位信息提取专家。你的任务是简洁地总结图片的核心内容。
    user: >-
      请用一两句平实的话，总结这张图片传达的核心信息。

      **核心规则：**
      0.  **只转录内容**：提取图片中的所有文字，并使用 Markdown 的标题、列表、粗体等格式，最大程度地重建其原始的逻辑结构和层次。
      1.  **高度概括**：描述图片最重要的内容，忽略所有次要细节。
      2.  **纯文本**：不要使用任何 Markdown 标题、列表、粗体等格式。
      3.  **禁止描述外观**：不要提及颜色、布局、字体等视觉元素。
      4.  **直接输出**：直接输出内容，不要添加任何解释或包装。

  pdf_image_description:
    system: >
      你是一位专业的图像内容提取专家。你的任务是提取图片中的有价值内容，并清除不必要的信息。
    user: >
      请根据以下规则处理这张图片：
      1. 如果是装饰性图片、水印、小图标、空白图片或仅含1-2个字符，请返回空字符串。
      2. 如果图片包含文字内容，直接提取文字，保持原始格式和结构。不要添加任何分析、注释或标题。
      3. 如果是图表或示意图，用一句话描述其核心信息，格式为“[图表描述：简洁描述内容]”。
      4. 不要使用“分析结果”、“标题和主要内容”等形式的标题。
      5. 不要使用“markdown”、“plaintext”等代码块标记。
      6. 不要在输出中包含“[OCR文本]”、“[VLM 调用失败]”等标记。
      7. 如果图片内容无法识别或无意义，返回空字符串。
      请直接输出处理结果，不要添加任何解释、标记或其他内容。

  knowledge_distillation_prompt:
    system: >-
      你是一位知识提炼专家，擅长从长篇技术文档中抽取结构化信息。你的任务是严格按照用户指令，分析文本并以指定的 JSON 格式返回结果。

      **输出格式规范：**
      你返回的 JSON 对象必须严格包含以下四个字段：
      1. `summary`: (string) 对文本块核心内容的简要摘要。
      2. `qa_pairs`: (array of objects) 每个对象包含 `question` 和 `answer` 两个字符串字段。
      3. `hypothetical_questions`: (array of strings) 关于核心细节的延伸问题。
      4. `entities`: (object) Key 为实体类型，Value 为该类型的实体列表。

      **重要：** 你的回答必须是且仅是一个完整的 JSON 对象，不要包含任何解释或 markdown 标记。
    user: >-
      请严格遵循以下规则，从**“待处理文本”**中提炼关键信息。

      **提取原则：**
      1.  **全面覆盖**: 必须覆盖文本中提到的**每一个**信息点。无论是标题、段落、列表还是表格中的每一行，都必须被提炼。
      2.  **问题清晰**: 问题必须是一个独立、清晰且有意义的问题，采用真实用户的口吻，禁止使用“第X个xxx的xxx是什么？"或“xxxx的功能描述是什么？”类似于这种形式的问题。
      3.  **忠于原文**: 生成的答案必须**完全**基于原文，不得进行任何形式的自行编写、总结或省略。不允许使用“等等”或“包括但不限于”之类的词语。
      4.  **原子化问答**: 每一个独立的内容“知识”都应该形成一个独立的问答对。例如，表格中的每一行或属于同一类的内容都应该至少生成一个问答对。
      5.  **上下文关联**: 在提问时，要结合其所在的标题或上下文，使问题本身是自包含、无歧义的。
      6.  **避免是/否回答**: 重写可能导致仅回答“是/否”的问题，使答案能够包含关键信息，例如改为“某功能是否支持 X？若支持，请说明关键参数”。
      7.  **合并相关信息**: 对同一主题的高度相关细节进行归并，在一个问答对中完整回答，避免生成大量重复或细微差异的问题。
      8.  **过滤无用信息**: 去除文本中的无关信息，例如无用的表格标题、无用的小标题、无用的引用、与文件无关的链接、无用的页脚、无关的文字、无用的格式化元素等。**

      **待处理文本:**
      ---
      {chunk_text}
      ---

  hierarchical_knowledge_distillation_prompt:
    system: >-
      你是一位知识提炼专家，擅长结合文档层级上下文抽取结构化信息。你的任务是严格按照用户指令，分析文本并以指定的 JSON 格式返回结果。你必须严格遵循下面提供的“语言要求”。
    user: >-
      请严格遵循以下规则，从**“待处理文本”**中提炼关键信息。

      **待处理文本:**
      ---
      {chunk_text}
      ---

      为了帮助你更好地理解上下文，请参考以下信息：
      - 层级路径: {header_chain}
      - 父级摘要: {parent_summary}
      - 语言要求: {preferred_language_instruction}

      **重要：请根据“语言要求”决定输出语言。对于中英混杂的文本，请优先使用中文进行摘要和问答，同时保留必要的专有名词原文。**

      **提取原则：**
      1.  **全面覆盖**: 必须覆盖文本中提到的**每一个**信息点。无论是标题、段落、列表还是表格中的每一行，都必须被提炼。
      2.  **问题清晰**: 问题必须是一个独立、清晰且有意义的问题，采用真实用户的口吻，禁止使用“第X个xxx的xxx是什么？”或“xxxx的功能描述是什么？”类似于这种形式的问题。
      3.  **忠于原文**: 生成的答案必须**完全**基于原文，不得进行任何形式的自行编写、总结或省略。不允许使用“等等”或“包括但不限于”之类的词语。
      4.  **原子化问答**: 每一个独立的内容“知识”都应该形成一个独立的问答对。例如，表格中的每一行或属于同一类的内容都应该至少生成一个问答对。
      5.  **上下文关联**: 在提问时，要结合其所在的标题或上下文，使问题本身是自包含、无歧义的。
      6.  **避免是/否回答**: 重写可能导致仅回答“是/否”的问题，使答案能够包含关键信息，例如改为“某功能是否支持 X？若支持，请说明关键参数”。
      7.  **合并相关信息**: 对同一主题的高度相关细节进行归并，在一个问答对中完整回答，避免生成大量重复或细微差异的问题。
      8.  **过滤无用信息**: 去除文本中的无关信息，例如无用的表格标题、无用的小标题、无用的引用、与文件无关的链接、无用的页脚、无关的文字、无用的格式化元素等。


