prompts:
  default_image_description:
    user: >-
      请详细描述这张图片或页面的内容，真实的识别并转录其中所有的文字，并解释关键的视觉元素（如图表、照片）。要求：请以 Markdown 输出，不需要 ```markdown 标记。

  technical_diagram_analysis:
    system: >-
      你是一位专业的系统架构师，你的任务是分析技术架构图。
    user: >-
      请以专业的视角分析这张系统架构图。识别出图中的所有组件、它们之间的连接关系、以及数据流动的方向。最后，以 Markdown 项目列表的形式总结你的分析。

    # 用于阶段一：从文本块生成原始问答对
  qa_generation:
    system: >-
      你是一位顶级的技术文档分析专家。你的任务是解析以 Markdown 格式编写的技术文档，并根据其内容生成一系列精确的问答（QA）对。你要特别注意文档的结构，例如标题、子标题和列表，因为它们为内容提供了重要的上下文。
    user: >-
      请仔细阅读以下 Markdown 文档，并生成尽可能多的、高质量的问答对。
      - **理解结构**: 将各级标题视为其下方内容的主题或上下文。
      - **问题**: 问题应该具体、清晰，模拟真实用户的提问方式。
      - **答案**: 答案必须严格从原文中提取，可以是一个词、一句话或一个完整的列表。确保答案是事实的直接陈述，不添加任何外部信息。
      - **输出格式**: 以JSON格式输出，格式为: `[{{"question": "...", "answer": "..."}}, ...]`。如果文档内容无法生成任何有意义的问答，则返回空列表 []。

      Markdown 文档内容如下：
      ---
      {context}
      ---

  # 用于阶段二：生成全局分类体系
  category_generation:
    system: >-
      你是一位顶级的知识管理架构师。你的任务是分析一系列问题，并从中提炼出一个高度概括、逻辑清晰且互不重叠的分类体系。
    user: >-
      我这里有一份从文档中提取的所有问题的列表。请仔细阅读它们，并总结出5到8个核心主题分类。
      - 每个分类名称应该简洁明了，能准确概括一类问题。
      - 所有分类应该是平级的，不要产生嵌套。
      - 以JSON格式输出，格式为:`{{"categories": ["分类一", "分类二", ...]}}`

      问题列表如下：
      ---
      {question_list}
      ---

  # 用于阶段三：合成标准问答并指派分类
  qa_synthesis:
    system: >-
      你是一位资深的FAQ知识库编辑。你的任务是处理一组原始问答对，将其转化为一个高质量的、标准的FAQ条目，并为其分配合理的类别。
    user: >-
      这里有一组关于某个主题的原始问答对，以及一个预定义的全局分类列表。请执行以下任务：

      1.  **分析簇内容**: 
          - 如果簇中只有一个问答对，直接采纳它的问题和答案作为标准问答。
          - 如果簇中有多个问答对，请将它们综合、提炼成一个逻辑连贯、信息完整的标准问答。创造一个最清晰、最能代表用户意图的“标准问题”，并综合所有原始答案编写一个全面、准确的“标准答案”。
      2.  **指派分类**: 从下面提供的“全局分类列表”中，为这个标准问答选择一个最合适的分类。

      请以JSON格式输出，格式为:`{{"question": "...", "answer": "...", "category": "..."}}`

      如果这组原始问答对质量很低、互相矛盾或没有信息价值，请返回一个空的JSON对象:{{}}。

      **全局分类列表**:
      {category_list}

      **原始问答对组**:
      ---
      {qa_cluster}
      ---
